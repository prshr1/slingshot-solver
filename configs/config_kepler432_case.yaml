# ===========================================================================
# Kepler-432 System Configuration
# ===========================================================================
# Comprehensive setup for 2-body AND 3-body gravitational slingshot analysis
# Star: Kepler-432a (K0V, 1.19 M☉)
# Planet: Kepler-432b (Hot Jupiter, 5.2 M♃, a ≈ 0.0896 AU)
#
# Canonical unit system: km-kg-s
#   Distances : km
#   Velocities: km/s
#   Masses    : kg
#   Energy    : km²/s² (≡ MJ/kg)
#   Constants : defined in slingshot/constants.py (not in config)
#
# This file is consumed by:
#   • slingshot.config.load_config()  →  FullConfig  (3-body pipeline)
#   • trajectory_tracks.py                           (2-body analysis)
# ===========================================================================

# ---------------------------------------------------------------------------
# SYSTEM (matches SystemConfig in slingshot/config.py)
# ---------------------------------------------------------------------------
system:
  name: "Kepler-432"
  M_star_Msun: 1.19         # Star mass [M☉]
  M_planet_Mjup: 5.2        # Planet mass [M♃]
  R_planet_Rjup: 1.155      # Planet radius [R♃]
  R_star_Rsun: 4.06         # Star radius [R☉]  (Kepler-432 is a K0 subgiant)
  a_planet_AU: 0.0896       # Orbital semi-major axis [AU]
  bulk_velocity_vx_kms: 0.0 # Optional system bulk velocity (Galilean boost)
  bulk_velocity_vy_kms: 0.0

# ---------------------------------------------------------------------------
# SAMPLING  (matches SamplingConfig)
# For ThreeBodySolver_v2.ipynb Monte Carlo campaign
# ---------------------------------------------------------------------------
sampling:
  mode: "barycentric"        # "barycentric" or "planet"

  # Barycentric mode: velocity magnitude and impact parameter
  v_mag_min_kms: 10.0        # km/s
  v_mag_max_kms: 120.0       # km/s
  impact_param_min_AU: 0.1   # AU
  impact_param_max_AU: 1   # AU
  angle_in_min_deg: -60.0    # degrees
  angle_in_max_deg: 60.0     # degrees

  # Planet-frame mode: orbit-relative sampling (alternative)
  r_min_factor: 10           # ×R_planet
  r_max_factor: 500.0        # ×R_planet
  v_rel_min_kms: 12.0        # km/s
  v_rel_max_kms: 80.0        # km/s

  # Barycentric filtering
  bary_unbound_requirement: "both"   # null | "pre" | "post" | "either" | "both"

# ---------------------------------------------------------------------------
# NUMERICAL  (matches NumericalConfig)
# ---------------------------------------------------------------------------
numerical:
  rtol: 1.0e-10
  atol: 1.0e-10
  ode_method: "DOP853"          # DOP853 (order 8) handles close encounters far better than RK45
  r_far_factor: 50              # ×R_planet for asymptotic regime (must be well outside Hill sphere)
  min_clearance_factor: 1.05    # Minimum planet surface clearance
  flyby_r_min_max_hill: 3        # Max r_min in Hill-sphere radii (rejects incomplete flybys)
  escape_radius_factor: 3       # Multiplier on r0_bary for escape termination (higher = fuller swing)
  softening_km: 1000.0          # Plummer softening (km); ≪ R_p avoids physics artefacts (0 = Newtonian)

# ---------------------------------------------------------------------------
# PIPELINE  (matches PipelineConfig)
# Monte Carlo sweep & candidate selection
# ---------------------------------------------------------------------------
pipeline:
  N_particles: 1200            # Number of Monte Carlo integrations
  t_mc_max_sec: 5e7             # Maximum integration time [s]
  t_best_max_sec: 5e7           # Re-run time limit [s]
  n_eval_best: 0                 # 0 = adaptive solver steps (dense near encounters)
  top_frac: 0.10                # Fraction of successes to re-run
  min_top: 1
  select_mode: "single"         # "single" | "pareto" | "weighted"
  select_metric: "bary_delta_v_pct"
  select_sign: "maximize"
  selection_objectives:         # used by pareto/weighted modes
    - metric: "bary_delta_v"
      sign: "maximize"
      weight: 1.0
    - metric: "delta_v_vec"
      sign: "maximize"
      weight: 1.0
    - metric: "energy_from_planet_orbit"
      sign: "maximize"
      weight: 1.0
  weighted_normalization: "minmax"
  n_parallel: null               # null = serial

# ---------------------------------------------------------------------------
# VISUALIZATION  (matches VisualizationConfig)
# ---------------------------------------------------------------------------
visualization:
  render_video: true
  video_fps: 30
  video_format: "mp4"
  animate_trajectory: true
  animate_phase_space: true
  animate_comparison: false
  figure_dpi: 100
  figure_format: "png"
  generate_publication_dashboard: true
  generate_candidate_ranking_plot: true
  trajectory_gradient_mode: "hexbin"
  trajectory_overlay_lines: true
  trajectory_overlay_line_count: 90
  trajectory_confidence_min_count: 2
  trajectory_energy_norm_mode: "auto"
  trajectory_energy_vmin: null
  trajectory_energy_vmax: null
  trajectory_hexbin_gridsize: 150
  trajectory_kde_sigma_bins: 2.0
  trajectory_time_frames: 48
  trajectory_time_export_npz: true

# ---------------------------------------------------------------------------
# TWO-BODY ENCOUNTER PARAMETERS  (consumed by trajectory_tracks.py)
# Not part of FullConfig – Pydantic ignores this section.
# Units: km-kg-s (matching canonical system)
# ---------------------------------------------------------------------------
two_body:
  # Which body the test particle is scattered off
  #   "star"   →  μ = G·M★       (stellar gravity-assist upper bound)
  #   "planet" →  μ = G·M_p      (planet flyby – comparable to 3-body)
  #   "both"   →  run both baselines
  scattering_body: "both"

  # Approach geometry (in lab / barycentric frame)
  v_approach_kms: 50.0           # Approach velocity [km/s]
  vstar0_kms: 10.0               # Star velocity [km/s]
  r_start_km: 1.0e11             # Initial separation [km]  (was 1e14 m → 1e11 km)

  # Impact-parameter scan
  b_min_km: 1.0e7                # Minimum impact parameter [km] (was 1e10 m → 1e7 km)
  b_max_km: 4.0e9                # Maximum impact parameter [km] (was 4e12 m → 4e9 km)
  num_b: 150
  log_spacing: true

  # Approach-angle scan (quadrant selection)
  angle_min_deg: 270.0
  angle_max_deg: 360.0
  num_angles: 200

  # Integration / output
  num_points: 400
  output_dir: "results/two_body"

# ---------------------------------------------------------------------------
# METADATA
# ---------------------------------------------------------------------------
metadata:
  case_name: "Kepler432_TwoBody_vs_ThreeBody"
  description: |
    Comparative analysis of:
      1. Star-scattering upper energy bound   (trajectory_tracks.py)
      2. Planet-scattering 2-body baseline     (trajectory_tracks.py)
      3. Optimal 3-body trajectories           (ThreeBodySolver_v2.ipynb)
    Goal: Quantify energy improvement from three-body planet encounter
    over the pure 2-body baselines.
  created: "2026-02-07"
  version: "2.0"
