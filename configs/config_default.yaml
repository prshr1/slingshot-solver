# Slingshot Solver Configuration
# Default configuration for Kepler-432 system analysis

system:
  name: Kepler-432
  M_star_Msun: 1.19
  M_planet_Mjup: 5.2
  R_planet_Rjup: 1.155
  R_star_Rsun: 4.06          # Star radius [R☉]
  a_planet_AU: 0.0896
  bulk_velocity_vx_kms: 0.0  # Optional system bulk velocity (Galilean boost)
  bulk_velocity_vy_kms: 0.0

sampling:
  mode: barycentric  # "barycentric" or "planet"
  
  # Barycentric parametric hyperbolic encounter
  v_mag_min_kms: 10.0
  v_mag_max_kms: 120.0
  impact_param_min_AU: 0.5
  impact_param_max_AU: 3.0
  angle_in_min_deg: -60.0
  angle_in_max_deg: 60.0
  
  # Planet-frame orbital parameters (alternative)
  r_min_factor: 20.0
  r_max_factor: 500.0
  v_rel_min_kms: 12.0
  v_rel_max_kms: 80.0
  
  # Barycentric filtering
  bary_unbound_requirement: both  # null, "pre", "post", "either", "both"

numerical:
  rtol: 1.0e-10
  atol: 1.0e-10
  ode_method: DOP853             # DOP853 | RK45 | Radau | BDF | LSODA
  r_far_factor: 50.0
  min_clearance_factor: 1.05
  flyby_r_min_max_hill: 10.0    # Max r_min in Hill-sphere radii (rejects incomplete flybys; null to disable)
  escape_radius_factor: 3.0     # Multiplier on r0_bary for escape termination (higher = fuller swing)
  softening_km: 1000.0          # Plummer softening length (km); caps force gradient at close approach (0 = Newtonian)

pipeline:
  N_particles: 3000
  t_mc_max_sec: 1.0e7
  t_best_max_sec: 1.0e7
  n_eval_best: 1000
  top_frac: 0.10
  min_top: 1
  select_mode: single  # "single", "pareto", "weighted"
  select_metric: bary_delta_v_pct  # e.g. "bary_delta_v", "delta_v_vec", "energy_from_planet_orbit"
  select_sign: maximize  # "maximize", "minimize", "abs"
  seed: null              # null = non-deterministic; set integer for reproducibility
  selection_objectives:  # used by pareto/weighted modes
    - metric: bary_delta_v
      sign: maximize
      weight: 1.0
    - metric: delta_v_vec
      sign: maximize
      weight: 1.0
    - metric: energy_from_planet_orbit
      sign: maximize
      weight: 1.0
  weighted_normalization: minmax  # "minmax" or "rank"
  n_parallel: null  # null = serial, >1 = parallel workers

visualization:
  render_video: true
  video_fps: 30
  video_format: mp4  # "mp4" or "gif"
  
  animate_trajectory: true
  animate_phase_space: true
  animate_comparison: false
  
  figure_dpi: 150
  figure_format: png
  generate_publication_dashboard: true
  generate_candidate_ranking_plot: true
  trajectory_gradient_mode: hexbin          # legacy | line_overlay | hexbin | kde | time_video
  trajectory_overlay_lines: true            # set false for pure gradient field
  trajectory_overlay_line_count: 90         # max representative lines when overlay is enabled
  trajectory_confidence_min_count: 2        # min samples per bin for trusted gradients
  trajectory_energy_norm_mode: auto         # auto | fixed
  trajectory_energy_vmin: null              # set when norm_mode=fixed
  trajectory_energy_vmax: null
  trajectory_hexbin_gridsize: 150
  trajectory_kde_sigma_bins: 2.0
  trajectory_time_frames: 48
  trajectory_time_export_npz: true

two_body:
  scattering_body: both
  baseline_mode: narrowed     # "fixed" (config v_approach) or "narrowed" (from 3-body envelope)
  padding_factor: 1.5         # envelope padding multiplier
  num_v: 20                   # velocity grid points (narrowed mode)
  num_b_narrow: 100           # impact-param grid (narrowed mode)
  num_angles_narrow: 100      # angle grid (narrowed mode)
  v_approach_kms: 50.0        # fixed-mode approach velocity [km/s]
  vstar0_kms: 10.0            # star velocity [km/s]
  r_start_km: 1.0e11          # initial separation [km]
  b_min_km: 1.0e7
  b_max_km: 4.0e9
  num_b: 150
  log_spacing: true
  angle_min_deg: 270.0
  angle_max_deg: 360.0
  num_angles: 200
  num_points: 400
  output_dir: results/two_body
