# ===========================================================================
# Kepler-432 — Interstellar Slingshot Configuration
# ===========================================================================
# Optimised for PLANET-MEDIATED gravity assist of unbound (interstellar)
# objects.  Research objective: maximise scalar ΔV extracted from the
# binary's orbital kinetic energy via the planet's gravitational lever,
# NOT from deep stellar potential well plunges.
#
# Key differences from config_kepler432_case.yaml:
#   • Impact parameters tightened to [0.03, 0.25] AU — targets planet's
#     orbital radius (0.0896 AU) ± a few Hill radii (r_H ≈ 0.01 AU)
#   • Wider angular range (±90°) for diverse approach geometries
#   • Star proximity filter enforced (2.0 R★) — rejects star-dominated
#     trajectories that are unphysical or irrelevant to slingshot research
#   • Selection metric: scalar ΔV (not ΔV %), prioritises raw speed gain
#   • 20 000 particles to compensate for tighter spatial targeting
#
# Canonical unit system: km-kg-s
# ===========================================================================

system:
  name: "Kepler-432"
  M_star_Msun: 1.19
  M_planet_Mjup: 5.2
  R_planet_Rjup: 1.155
  R_star_Rsun: 4.06
  a_planet_AU: 0.0896
  bulk_velocity_vx_kms: 10.0
  bulk_velocity_vy_kms: 0.0

sampling:
  mode: "barycentric"

  # Velocity range — covers realistic interstellar objects
  # ('Oumuamua ≈ 26 km/s, Borisov ≈ 32 km/s at ∞)
  v_mag_min_kms: 20.0
  v_mag_max_kms: 125.0

  # Impact parameters tightly bracketing the planet's orbit
  impact_param_min_AU: 0.08
  impact_param_max_AU: 0.14

  # Wide angular coverage for diverse planet-frame approach speeds
  angle_in_min_deg: -90.0
  angle_in_max_deg: 90.0

  # Starting distance override (AU).  When set, ALL particles begin at
  # this fixed barycentric distance instead of the default 2× impact_param.
  # Useful when you want consistent integration baselines regardless of b.
  # Omit or set to null to keep the default adaptive behaviour.
  
  r_init_AU: 2.0

  # Planet-frame mode parameters (alternative, unused here)
  r_min_factor: 10
  r_max_factor: 500.0
  v_rel_min_kms: 12.0
  v_rel_max_kms: 80.0

  # Interstellar: must be unbound on both entry and exit
  bary_unbound_requirement: "both"

numerical:
  rtol: 1.0e-10
  atol: 1.0e-10
  ode_method: "DOP853"
  r_far_factor: 50
  min_clearance_factor: 1.05
  flyby_r_min_max_hill: 5         # Slightly wider than 3× to catch grazing planet flybys
  escape_radius_factor: 3
  softening_km: 1000.0

  # Star proximity filter — reject trajectories that plunge into the star
  # 2.0 R★ excludes Roche-limit grazing; increase to 5.0 for strictly
  # planet-dominated encounters.
  star_min_clearance_Rstar: 2.0

pipeline:
  N_particles: 1000
  t_mc_max_sec: 5e7
  t_best_max_sec: 5e7
  n_eval_best: 0
  top_frac: 0.10
  min_top: 5
  select_mode: "single"         # "single" | "pareto" | "weighted"
  select_metric: "bary_delta_v"   # Raw scalar ΔV, not percentage
  select_sign: "maximize"
  selection_objectives:         # used by pareto/weighted modes
    - metric: "bary_delta_v"
      sign: "maximize"
      weight: 1.0
    - metric: "delta_v_vec"
      sign: "maximize"
      weight: 1.0
    - metric: "energy_from_planet_orbit"
      sign: "maximize"
      weight: 1.0
  weighted_normalization: "minmax"
  n_parallel: null

visualization:
  render_video: false             # Disable video for batch runs
  video_fps: 30
  video_format: "mp4"
  animate_trajectory: true
  animate_phase_space: true
  animate_comparison: false
  figure_dpi: 100
  figure_format: "png"
  generate_publication_dashboard: true
  generate_candidate_ranking_plot: true
  trajectory_gradient_mode: "kde"      # "line_overlay" | "hexbin" | "kde" | "time_video"
  trajectory_overlay_lines: false         # gradient-only testing (no trajectory line clutter)
  trajectory_overlay_line_count: 0
  trajectory_confidence_min_count: 2
  trajectory_energy_norm_mode: "auto"     # use "fixed" with vmin/vmax for cross-run parity
  trajectory_energy_vmin: null
  trajectory_energy_vmax: null
  trajectory_hexbin_gridsize: 150
  trajectory_kde_sigma_bins: 2.0
  trajectory_time_frames: 48
  trajectory_time_export_npz: true

two_body:
  scattering_body: "both"
  baseline_mode: "narrowed"
  padding_factor: 1.5
  num_v: 30
  num_b_narrow: 150
  num_angles_narrow: 150
  v_approach_kms: 50.0
  vstar0_kms: 10.0
  r_start_km: 1.0e11
  b_min_km: 1.0e7
  b_max_km: 4.0e9
  num_b: 150
  log_spacing: true
  angle_min_deg: 270.0
  angle_max_deg: 360.0
  num_angles: 200
  num_points: 400
  output_dir: "results/two_body"

metadata:
  case_name: "Kepler432_Interstellar_Slingshot"
  description: |
    Planet-mediated gravitational slingshot study for interstellar objects.
    Goal: Quantify energy extraction from binary orbital KE via planet
    deflection, with star proximity filtering to ensure planet-dominated
    encounters only.
  created: "2026-02-09"
  version: "2.3"
